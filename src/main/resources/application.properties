spring.application.name=last_table_server

server.port=9987

# Database Connection
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/last_table?serverTimezone=Asia/Seoul&useUniCode=yes&characterEncoding=UTF-8
spring.datasource.username=ssafy
spring.datasource.password=ssafy

# MyBatis Settings
mybatis.mapper-locations=classpath:mappers/**/*.xml
mybatis.type-aliases-package=com.ssafy.lasttable.reservation.entity
mybatis.configuration.map-underscore-to-camel-case=true

# Logging
logging.level.com.ssafy.lasttable=DEBUG